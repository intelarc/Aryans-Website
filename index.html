<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Link - Discord </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a2e;
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #16213e;
            border: 1px solid rgba(180, 130, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .widget-wrap {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(180, 130, 255, 0.15);
        }

        .join-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 28px;
            background: #7c3aed;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }

        .join-btn:hover {
            background: #6d28d9;
            transform: translateY(-1px);
        }

        .join-btn:active {
            transform: translateY(0);
            background: #5b21b6;
        }

        .footer {
            font-size: 12px;
            color: rgba(200, 160, 255, 0.4);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="widget-wrap">
            <iframe src="https://discord.com/widget?id=1372820346956415066&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
        </div>

        <a href="https://discord.gg/AHNHqvkR9F" target="_blank" class="join-btn">
             Join Server :3
        </a>

        <div class="footer">- ARYANPCS - MEOWPCS ~</div>
    </div>
</body>
</html>
