<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>:3</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #150a0e;
      color: #d0d0d0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 20px 80px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid #3a1f2a;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .name {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #e8e8e8;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #3d2030;
      margin-bottom: 44px;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      border: 1px solid #1e1e1e;
      background: transparent;
      color: #fff;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .link-btn:hover {
      border-color: #3a1f2a;
      color: #ccc;
      background: #130d10;
    }

    .link-btn svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .link-btn .arrow {
      margin-left: auto;
      font-size: 10px;
      color: #2a2a2a;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .arrow {
      color: #c4627a;
      transform: translateX(2px);
    }

    .divider {
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: #161616;
      margin: 32px 0;
    }

    .about { width: 100%; max-width: 340px; }

    .about-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: #7a3050;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .about p {
      font-size: 11px;
      line-height: 2;
      color: #fff;
    }
  </style>
</head>
